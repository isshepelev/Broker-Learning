<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ==================== HEAD FRAGMENT ==================== -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Broker Learning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1TxMICrLB0+bSatGOlDENy0jTlFGGlk"
          crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===============================================
           GLOBAL
           =============================================== */
        :root {
            --c-bg: #f4f6f8;
            --c-surface: #ffffff;
            --c-border: #e5e7eb;
            --c-text: #1f2937;
            --c-text-secondary: #6b7280;
            --c-text-muted: #9ca3af;

            --c-primary: #0d9488;
            --c-primary-hover: #0f766e;
            --c-primary-light: #ccfbf1;
            --c-primary-soft: #f0fdfa;

            --c-accent: #f59e0b;
            --c-accent-light: #fef3c7;

            --c-success: #10b981;
            --c-success-light: #d1fae5;
            --c-danger: #ef4444;
            --c-danger-light: #fee2e2;
            --c-info: #3b82f6;
            --c-info-light: #dbeafe;

            --c-navbar-from: #111827;
            --c-navbar-to: #1f2937;

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.06);
            --shadow-md: 0 4px 6px rgba(0,0,0,.04), 0 2px 4px rgba(0,0,0,.06);
            --shadow-lg: 0 10px 25px rgba(0,0,0,.07), 0 4px 10px rgba(0,0,0,.04);
            --transition: .25s cubic-bezier(.4,0,.2,1);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--c-bg);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--c-text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ===============================================
           HEADER
           =============================================== */
        .site-header {
            background: linear-gradient(135deg, var(--c-navbar-from), var(--c-navbar-to));
            position: sticky;
            top: 0;
            z-index: 1030;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1320px;
            margin: 0 auto;
            padding: .85rem 1.5rem .5rem;
        }

        .site-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: #f9fafb;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity var(--transition);
        }
        .site-brand:hover { opacity: .8; color: #f9fafb; }

        .header-external {
            color: var(--c-accent);
            text-decoration: none;
            font-weight: 600;
            font-size: .88rem;
            padding: .45rem 1rem;
            border: 1.5px solid rgba(245,158,11,.4);
            border-radius: 50px;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .header-external:hover {
            color: #fff;
            background: rgba(245,158,11,.2);
            border-color: var(--c-accent);
        }

        /* Навигация — горизонтальная полоса pill-кнопок */
        .nav-strip {
            max-width: 1320px;
            margin: 0 auto;
            padding: 0 1.5rem .85rem;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav-pill {
            display: inline-block;
            color: #9ca3af;
            text-decoration: none;
            font-weight: 600;
            font-size: .9rem;
            padding: .5rem 1.2rem;
            border-radius: 50px;
            border: 1.5px solid transparent;
            background: rgba(255,255,255,.06);
            transition: all var(--transition);
            white-space: nowrap;
        }

        .nav-pill:hover {
            color: #ffffff;
            background: rgba(255,255,255,.12);
            border-color: rgba(255,255,255,.1);
            transform: translateY(-1px);
        }

        .nav-pill.active {
            color: #ffffff;
            background: var(--c-primary);
            border-color: var(--c-primary);
            box-shadow: 0 2px 10px rgba(13,148,136,.35);
        }
        .nav-pill.active:hover {
            background: var(--c-primary-hover);
            border-color: var(--c-primary-hover);
        }

        /* ===============================================
           LAYOUT
           =============================================== */
        .container-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 5rem;
        }

        .page-header {
            margin-bottom: 2.25rem;
            text-align: center;
        }
        .page-header h2 {
            color: var(--c-text);
            font-weight: 700;
            font-size: 1.65rem;
            margin-bottom: .4rem;
            letter-spacing: -.02em;
        }
        .page-header p {
            color: var(--c-text-secondary);
            max-width: 650px;
            margin: 0 auto;
            font-size: .92rem;
            line-height: 1.65;
        }

        /* ===============================================
           CARDS
           =============================================== */
        .card {
            border: 1px solid var(--c-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            background: var(--c-surface);
            transition: box-shadow var(--transition), transform var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .card-header {
            border-radius: var(--radius-md) var(--radius-md) 0 0 !important;
            font-weight: 600;
            padding: .9rem 1.25rem;
            border-bottom: 1px solid var(--c-border);
        }
        .card-body { padding: 1.25rem; }
        .card-footer {
            border-top: 1px solid var(--c-border);
            padding: .75rem 1.25rem;
        }

        /* ===============================================
           STAT CARDS
           =============================================== */
        .stat-card {
            border-left: 4px solid var(--c-primary);
            text-align: center;
            padding: 1.5rem 1rem !important;
        }
        .stat-card .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--c-text);
            line-height: 1.15;
        }
        .stat-card .stat-label {
            color: var(--c-text-muted);
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .07em;
            font-weight: 600;
            margin-bottom: .35rem;
        }

        /* ===============================================
           BADGES
           =============================================== */
        .badge-topic {
            background-color: var(--c-primary-light);
            color: var(--c-primary);
            font-weight: 600;
            font-size: .78rem;
            padding: .3em .6em;
            border-radius: 6px;
        }

        .status-badge-running {
            background-color: var(--c-success-light);
            color: #065f46;
            font-weight: 600;
            padding: .35em .7em;
            border-radius: 6px;
        }
        .status-badge-stopped {
            background-color: var(--c-danger-light);
            color: #991b1b;
            font-weight: 600;
            padding: .35em .7em;
            border-radius: 6px;
        }

        /* ===============================================
           THEORY SECTION
           =============================================== */
        .theory-section {
            background: var(--c-primary-soft);
            border-left: 4px solid var(--c-primary);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            padding: 1.3rem 1.5rem;
            margin-bottom: 2rem;
        }
        .theory-section h5 {
            color: var(--c-text);
            margin-bottom: .6rem;
            font-size: 1rem;
            font-weight: 700;
        }
        .theory-section p,
        .theory-section li {
            color: var(--c-text-secondary);
            margin-bottom: 0;
            font-size: .88rem;
            line-height: 1.7;
        }

        /* ===============================================
           BUTTONS
           =============================================== */
        .btn {
            font-weight: 600;
            font-size: .88rem;
            border-radius: var(--radius-sm);
            padding: .5rem 1.15rem;
            transition: all var(--transition);
            letter-spacing: -.005em;
        }
        .btn:active { transform: scale(.97); }

        .btn-primary-custom {
            background: linear-gradient(135deg, var(--c-primary), #0f766e);
            border: none;
            color: #fff;
            box-shadow: 0 2px 8px rgba(13,148,136,.25);
        }
        .btn-primary-custom:hover {
            background: linear-gradient(135deg, #0f766e, #115e59);
            color: #fff;
            box-shadow: 0 4px 14px rgba(13,148,136,.35);
            transform: translateY(-1px);
        }

        .btn-outline-custom {
            border: 1.5px solid var(--c-primary);
            color: var(--c-primary);
            background: transparent;
        }
        .btn-outline-custom:hover {
            background: var(--c-primary);
            color: #fff;
            box-shadow: 0 2px 8px rgba(13,148,136,.2);
            transform: translateY(-1px);
        }

        .btn-outline-secondary {
            border: 1.5px solid var(--c-border);
            color: var(--c-text-secondary);
        }
        .btn-outline-secondary:hover {
            background: #f9fafb;
            color: var(--c-text);
            border-color: #d1d5db;
        }

        .btn-outline-danger {
            border: 1.5px solid var(--c-danger);
            color: var(--c-danger);
        }
        .btn-outline-danger:hover {
            background: var(--c-danger);
            color: #fff;
            box-shadow: 0 2px 8px rgba(239,68,68,.2);
        }

        .btn-sm {
            font-size: .8rem;
            padding: .35rem .8rem;
        }

        /* ===============================================
           FORMS
           =============================================== */
        .form-label {
            font-size: .85rem;
            font-weight: 600;
            color: var(--c-text);
            margin-bottom: .4rem;
        }

        .form-control, .form-select {
            font-size: .88rem;
            border: 1.5px solid var(--c-border);
            border-radius: var(--radius-sm);
            padding: .55rem .85rem;
            color: var(--c-text);
            background: var(--c-surface);
            transition: all var(--transition);
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--c-primary);
            box-shadow: 0 0 0 3px rgba(13,148,136,.12);
            outline: none;
        }
        .form-control::placeholder { color: var(--c-text-muted); }

        .form-check-input {
            border: 1.5px solid #d1d5db;
            transition: all var(--transition);
        }
        .form-check-input:checked {
            background-color: var(--c-primary);
            border-color: var(--c-primary);
        }
        .form-check-input:focus {
            box-shadow: 0 0 0 3px rgba(13,148,136,.15);
            border-color: var(--c-primary);
        }
        .form-check-label {
            font-size: .88rem;
            color: var(--c-text-secondary);
        }

        /* ===============================================
           TABLES
           =============================================== */
        .table { font-size: .88rem; }
        .table thead th {
            background-color: #f9fafb;
            border-bottom: 2px solid var(--c-border);
            color: var(--c-text-muted);
            font-weight: 700;
            font-size: .76rem;
            text-transform: uppercase;
            letter-spacing: .05em;
            white-space: nowrap;
            padding: .7rem 1rem;
        }
        .table td {
            vertical-align: middle;
            padding: .65rem 1rem;
            border-bottom: 1px solid #f3f4f6;
        }
        .table-hover tbody tr {
            transition: background var(--transition);
        }
        .table-hover tbody tr:hover {
            background-color: #f9fafb;
        }

        /* ===============================================
           RESULT AREA
           =============================================== */
        .result-area {
            background: #f9fafb;
            border: 1.5px solid var(--c-border);
            border-radius: var(--radius-sm);
            padding: 1rem 1.15rem;
            min-height: 60px;
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
            font-size: .84rem;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        /* ===============================================
           SSE MESSAGES
           =============================================== */
        .sse-message {
            animation: slideIn .35s cubic-bezier(.25,.46,.45,.94);
            border-left: 3px solid var(--c-primary);
            padding: .6rem .85rem;
            margin-bottom: .6rem;
            background: var(--c-surface);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-size: .87rem;
            border: 1px solid var(--c-border);
            border-left: 3px solid var(--c-primary);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ===============================================
           ALERTS
           =============================================== */
        .alert {
            border-radius: var(--radius-sm);
            font-size: .88rem;
            border: none;
        }

        /* ===============================================
           LIST GROUP
           =============================================== */
        .list-group-item {
            border-color: #f3f4f6;
            padding: .85rem 1.25rem;
            transition: background var(--transition);
        }
        .list-group-item:hover {
            background: #fafbfc;
        }

        /* ===============================================
           MISC
           =============================================== */
        code {
            background: #f3f4f6;
            color: var(--c-primary-hover);
            padding: .15em .4em;
            border-radius: 4px;
            font-size: .84em;
            font-weight: 500;
        }

        hr {
            border-color: var(--c-border);
            opacity: .6;
        }

        .text-muted { color: var(--c-text-muted) !important; }

        /* scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>

<!-- ==================== NAVBAR FRAGMENT ==================== -->
<header th:fragment="navbar" class="site-header">
    <div class="header-top">
        <a class="site-brand" href="/" th:href="@{/}">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
            </svg>
            Broker Learning
        </a>
        <a class="header-external" href="http://localhost:8090" target="_blank" rel="noopener">Kafka UI &#8599;</a>
    </div>
    <nav class="nav-strip">
        <a class="nav-pill" th:classappend="${currentPage == 'dashboard' ? 'active' : ''}" href="/" th:href="@{/}">Dashboard</a>
        <a class="nav-pill" th:classappend="${currentPage == 'producer' ? 'active' : ''}" href="/producer" th:href="@{/producer}">Producer</a>
        <a class="nav-pill" th:classappend="${currentPage == 'consumer' ? 'active' : ''}" href="/consumer" th:href="@{/consumer}">Consumer</a>
        <a class="nav-pill" th:classappend="${currentPage == 'topics' ? 'active' : ''}" href="/topics" th:href="@{/topics}">Topics</a>
        <a class="nav-pill" th:classappend="${currentPage == 'partitions' ? 'active' : ''}" href="/partitions" th:href="@{/partitions}">Partitions</a>
        <a class="nav-pill" th:classappend="${currentPage == 'delivery-semantics' ? 'active' : ''}" href="/delivery-semantics" th:href="@{/delivery-semantics}">Семантики доставки</a>
        <a class="nav-pill" th:classappend="${currentPage == 'jobs' ? 'active' : ''}" href="/jobs" th:href="@{/jobs}">Jobs</a>
        <a class="nav-pill" th:classappend="${currentPage == 'consumer-groups' ? 'active' : ''}" href="/consumer-groups" th:href="@{/consumer-groups}">Consumer Groups</a>
        <a class="nav-pill" th:classappend="${currentPage == 'history' ? 'active' : ''}" href="/history" th:href="@{/history}">История</a>
        <a class="nav-pill" th:classappend="${currentPage == 'monitoring' ? 'active' : ''}" href="/monitoring" th:href="@{/monitoring}">Мониторинг</a>
    </nav>
</header>

<!-- ==================== SCRIPTS FRAGMENT ==================== -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
</div>

</html>
